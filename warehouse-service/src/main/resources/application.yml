server:
  port: 8070
spring:
  application:
    name: warehouse-service
  config:
      import: "classpath:ssl-server.yml"
  data:
    mongodb:
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27016}
      database: warehouse
      username: ${PERSONAL_EMAIL:mongo}
      password: ${PERSONAL_PASSWORD:mongo}
      authentication-database: admin
management:
  tracing:
    enabled: ${OBSERVABILITY_STACK_ENABLED:true}
    sampling:
      probability: 1.0
  metrics:
    export:
      prometheus:
        enabled: ${OBSERVABILITY_STACK_ENABLED:true}
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  otlp:
    tracing:
      endpoint: ${ALLOY_TRACES_SEND_URL:http://localhost:4319/v1/traces}
      transport: grpc
    metrics:
      export:
        enabled: ${OBSERVABILITY_STACK_ENABLED:true}
        url: ${ALLOY_METRICS_SEND_URL:http://localhost:4320/v1/metrics}
logging:
  pattern:
    level: "%5p [traceId=%X{traceId}, spanId=%X{spanId}]"
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
    org.springframework.data.mongodb.repository.query: DEBUG
    io.micrometer.tracing: INFO
    io.opentelemetry: WARN
    io.opentelemetry.exporter: WARN
    org.apache.tomcat.util.net: DEBUG