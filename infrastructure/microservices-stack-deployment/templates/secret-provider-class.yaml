apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: akv-global-secrets #{{ .Values.global.secretProviderClassName }}
  namespace: default
  annotations:
    "helm.sh/hook": pre-install, pre-upgrade
spec:
  provider: azure
  secretObjects:
    - secretName: global-k8s-secrets #{{ .Values.global.secretsName }}
      type: Opaque
      data:
        - objectName: PERSONAL-PASSWORD
          key: PERSONAL_PASSWORD

        - objectName: PERSONAL-PASSWORD
          key: MONGODB_ROOT_PASSWORD

        - objectName: KEYCLOAK-ORDERS-SECRET-ID
          key: KEYCLOAK_ORDERS_SECRET_ID

        - objectName: Truststore
          key: Truststore

        - objectName: Orders-Service-Keystore
          key: ORDERS_SERVICE_KEYSTORE

        - objectName: Products-Service-Keystore
          key: PRODUCTS_SERVICE_KEYSTORE

        - objectName: Warehouse-Service-Keystore
          key: WAREHOUSE_SERVICE_KEYSTORE

        - objectName: SSL-TRUST-STORE-PASSWORD
          key: SSL_TRUST_STORE_PASSWORD

        - objectName: SSL-KEY-STORE-PASSWORD
          key: SSL_KEY_STORE_PASSWORD

        - objectName: AZURE-SERVICE-STORAGE-ACCOUNT-BLOB-STORAGE-MICROSERVICESLOKILOGS-ACCOUNT-KEY
          key: AZURE_SERVICE_STORAGE_ACCOUNT_BLOB_STORAGE_MICROSERVICESLOKILOGS_ACCOUNT_KEY

  parameters:
    usePodIdentity: "false"
    keyvaultName: "AppVaultStore"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "ecd50515-4475-4065-ad3a-c29be1b06e80"
    tenantId: "70d441cb-87ea-4640-ab2e-bf5af482bf0a"
    objects: |
      array:
        - |
          objectName: PERSONAL-PASSWORD
          objectType: secret
        - |
          objectName: SSL-KEY-STORE-PASSWORD
          objectType: secret
        - |
          objectName: SSL-TRUST-STORE-PASSWORD
          objectType: secret
        - |
          objectName: KEYCLOAK-ORDERS-SECRET-ID
          objectType: secret
        - |
          objectName: Truststore
          objectType: secret
        - |
          objectName: Orders-Service-Keystore
          objectType: secret
          objectFormat: pfx
        - |
          objectName: Products-Service-Keystore
          objectType: secret
          objectFormat: pfx
        - |
          objectName: Warehouse-Service-Keystore
          objectType: secret
          objectFormat: pfx
        - |
          objectName: AZURE-SERVICE-STORAGE-ACCOUNT-BLOB-STORAGE-MICROSERVICESLOKILOGS-ACCOUNT-KEY
          objectType: secret






