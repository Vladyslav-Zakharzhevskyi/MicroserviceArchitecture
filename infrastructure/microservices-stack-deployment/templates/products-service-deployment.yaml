apiVersion: apps/v1
kind: Deployment
metadata:
  name: products-service
spec:
  replicas: {{ .Values.productsService.replicaCount }}
  selector:
    matchLabels:
      app: products-service
  template:
    metadata:
      labels:
        app: products-service
    spec:
      containers:
        - name: products-service
          image: "{{ .Values.productsService.image.repository }}:{{ .Values.global.environment.image.tag }}"
            {{ if .Values.productsService.command }}
          command: {{ .Values.productsService.command | toJson }}
            {{ end }}
            {{ if .Values.productsService.args }}
          args: {{ .Values.productsService.args | toJson }}
            {{ end }}
          envFrom:
            - secretRef:
                name: {{ .Values.global.secretsName }}
          env:
            # DB Connection
            - name: POSTGRES_HOST
              value: "{{ .Release.Name }}-{{ .Values.productsService.environments.db.host }}"
            - name: POSTGRES_PORT
              value: {{ .Values.productsService.environments.db.port | quote}}
            - name: PERSONAL_EMAIL
              value: {{ .Values.global.environment.personalEmail }}
            - name: PERSONAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretsName }}
                  key: PERSONAL_PASSWORD
            # Keycloak
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.productsService.environments.keycloak.clientId }}
            - name: KEYCLOAK_ISSUER_URI
              value: http://{{ .Release.Name }}-keycloak:80/realms/searching-work
            - name: KEYCLOAK_JWK_URI
              value: {{ .Values.global.environment.keycloak.keycloakJWKUri }}

            # Feign todo replace with _helpers.tpl
            - name: ECO_SERVICE_PRODUCTS_URL
              value: "https://{{ .Release.Name }}-products-service:{{ .Values.productsService.port }}/api/products"
            - name: ECO_SERVICE_ORDERS_URL
              value: "https://{{ .Release.Name }}-orders-service:{{ .Values.ordersService.port }}/api/v1/orders"
            - name: ECO_SERVICE_WAREHOUSE_URL
              value: "https://{{ .Release.Name }}-warehouse-service:{{ .Values.warehouseService.port }}/api/v1/warehouse"
            # Feign todo replace with _helpers.tpl

            # SSL security
            - name: SSL_KEY_STORE_LOCATION
              value: "/mnt/secrets/Products-Service-Keystore"
            - name: SSL_KEY_STORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretsName }}
                  key: SSL_KEY_STORE_PASSWORD
            - name: SSL_TRUST_STORE_LOCATION
              value: "file:/mnt/secrets/Truststore"
            - name: SSL_TRUST_STORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.secretsName }}
                  key: SSL_TRUST_STORE_PASSWORD

            # Observability and Alloy endpoints
            - name: OBSERVABILITY_STACK_ENABLED
              value: {{ .Values.global.environment.isObservabilityEnabled | quote}}
            - name: ALLOY_METRICS_SEND_URL
              value: {{ .Values.global.environment.alloyEndpoint.metrics }}
            - name: ALLOY_TRACES_SEND_URL
              value: {{ .Values.global.environment.alloyEndpoint.traces }}

            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.global.environment.springProfilesActive }}

          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets"
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.global.secretProviderClassName }}