apiVersion: v2
name: my-microservices-stack
description: A Helm chart for my Spring Boot microservices and infrastructure
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: keycloak
    version: "24.5.8"
    repository: "https://charts.bitnami.com/bitnami"
  - name: postgresql
    alias: products-postgres
    version: "16.2.0"
    repository: "https://charts.bitnami.com/bitnami"
  - name: mongodb
    alias: warehouse-mongo
    version: "18.2.0"
    repository: "https://charts.bitnami.com/bitnami"
  - name: postgresql
    alias: orders-postgres
    version: "16.2.0"
    repository: "https://charts.bitnami.com/bitnami"


