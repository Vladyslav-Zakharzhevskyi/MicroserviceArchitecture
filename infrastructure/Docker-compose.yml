version: '3.9'

services:

  postgres-keycloak:
    image: postgres:16
    container_name: postgres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${PERSONAL_EMAIL}
      POSTGRES_PASSWORD: ${PERSONAL_PASSWORD}
    ports:
      - "5400:5432"
    volumes:
      - ./postgres-keycloak-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: ${PERSONAL_EMAIL}
      KC_DB_PASSWORD: ${PERSONAL_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${PERSONAL_EMAIL}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${PERSONAL_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    ports:
      - "5000:8080"
    volumes:
      - ./static/keycloak/realms/searching-work-realm.json:/opt/keycloak/data/import/realm-local-stage-prod.json
    command: [ "start-dev", "--import-realm" ]

  products-postgres:
    image: postgres:17.0
    container_name: products-postgres
    environment:
      POSTGRES_DB: products
      POSTGRES_USER: ${PERSONAL_EMAIL}
      POSTGRES_PASSWORD: ${PERSONAL_PASSWORD}
    ports:
      - "5430:5432"
    volumes:
      - ../product-service/src/main/resources/database:/docker-entrypoint-initdb.d:ro
      - ./postgres-products-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 20

