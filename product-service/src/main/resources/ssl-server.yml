server:
  ssl:
    enabled: true
    key-store: file:${SSL_KEY_STORE_LOCATION:''}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:''}
    key-store-type: PKCS12
    key-alias: keystore-products
    trust-store: file:${SSL_TRUST_STORE_LOCATION:''}
    trust-store-password: ${SSL_TRUST_STORE_PASSWORD:''}
    trust-store-type: PKCS12
    client-auth: need